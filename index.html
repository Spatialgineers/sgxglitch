<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX Visualizer | Dimension Engine</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Rajdhani', 'sans-serif'] },
                    colors: {
                        sgxBlue: '#32527B', sgxYellow: '#FDCC0D',
                        sgxDark: '#010409', sgxPanel: 'rgba(2, 8, 15, 0.85)'
                    }
                }
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #010409; color: #FDCC0D; user-select: none; }
        #canvas-container { position: absolute; width: 100vw; height: 100vh; z-index: 0; }
        
        .sgx-panel { background: rgba(2, 8, 15, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(50, 82, 123, 0.5); border-left: 4px solid #FDCC0D; border-radius: 1rem; }
        .sgx-glow { text-shadow: 0 0 10px rgba(253, 204, 13, 0.6); }
        
        /* Controles móviles optimizados */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; height: 16px; margin: 5px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #FDCC0D; box-shadow: 0 0 10px #FDCC0D; cursor: pointer; margin-top: -8px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #32527B; border-radius: 2px; }
        
        .effect-btn { background: rgba(50, 82, 123, 0.2); border: 1px solid #32527B; padding: 8px; font-size: 10px; font-weight: bold; text-align: center; border-radius: 8px; cursor: pointer; transition: all 0.2s; color: white; }
        .effect-btn.active { background: #FDCC0D; color: #010409; box-shadow: 0 0 10px rgba(253,204,13,0.5); border-color: #FDCC0D; }

        #media-feed { display: none; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <video id="media-feed" src="https://video.wixstatic.com/video/fe81a7_056f6ceeb6744f94991016499cfd95ae/1080p/mp4/file.mp4" loop autoplay muted playsinline crossorigin="anonymous"></video>
    <canvas id="texture-canvas" style="display:none;"></canvas>

    <div id="ui-layer" class="hidden w-full h-screen p-6 flex-col justify-between pointer-events-none absolute inset-0 z-10">
        
        <div class="flex justify-between items-start">
            <div class="sgx-panel p-4 pointer-events-auto">
                <h1 class="text-2xl font-bold sgx-glow tracking-[0.1em] uppercase">SPATIALGINEERS</h1>
                <p class="text-[10px] tracking-widest text-sgxBlue font-bold" id="host-status">VFX ENGINE: ESPERANDO ENLACE P2P...</p>
            </div>
        </div>

        <div class="flex justify-end items-end w-full">
            <div class="sgx-panel p-4 flex flex-col items-center shadow-2xl pointer-events-auto">
                <div class="bg-white p-2 rounded-lg mb-2">
                    <div id="qrcode"></div>
                </div>
                <p class="font-bold text-[11px] tracking-widest text-center text-sgxYellow">ESCANEA PARA CRUZAR<br>LA DIMENSIÓN</p>
            </div>
        </div>
    </div>

    <div id="controller-ui" class="hidden w-full h-[100dvh] bg-sgxDark flex-col relative overflow-hidden">
        
        <div class="w-full h-[55%] bg-black relative">
            <video id="local-video" class="w-full h-full object-cover" autoplay playsinline muted></video>
            <div class="absolute top-4 left-4 bg-red-600 text-white text-[10px] px-2 py-1 rounded font-bold animate-pulse" id="live-indicator" style="display:none;">LIVE P2P</div>
            
            <div id="setup-section" class="absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-sm z-20">
                <button id="btn-activar" class="bg-sgxYellow text-sgxDark font-bold text-lg px-8 py-4 rounded-full hover:scale-105 active:scale-95 transition shadow-[0_0_20px_#FDCC0D]">
                    INICIAR TRANSMISIÓN
                </button>
            </div>
        </div>

        <div class="w-full h-[45%] sgx-panel rounded-t-3xl -mt-6 z-10 p-5 flex flex-col gap-4 overflow-y-auto">
            
            <div>
                <h3 class="text-[10px] font-bold tracking-widest text-sgxYellow uppercase mb-2">Motor de Efectos (Ubershader)</h3>
                <div class="grid grid-cols-5 gap-2" id="effect-grid">
                    <div class="effect-btn active" data-mode="0">SPIDER<br>VERSE</div>
                    <div class="effect-btn" data-mode="1">DATA<br>MOSH</div>
                    <div class="effect-btn" data-mode="2">FLUID<br>LIQUIFY</div>
                    <div class="effect-btn" data-mode="3">SOBEL<br>NEON</div>
                    <div class="effect-btn" data-mode="4">KINETIC<br>PULSE</div>
                    <div class="effect-btn" data-mode="5">CRT<br>GHOST</div>
                    <div class="effect-btn" data-mode="6">CHROMA<br>EXTREM</div>
                    <div class="effect-btn" data-mode="7">DEPTH<br>MAP</div>
                    <div class="effect-btn" data-mode="8">ASCII<br>VOID</div>
                    <div class="effect-btn" data-mode="9">THERMAL<br>PRED</div>
                </div>
            </div>

            <div class="flex-grow flex flex-col justify-center gap-3">
                <div>
                    <div class="flex justify-between text-[11px] font-bold mb-1"><label>STOP-MOTION (FPS)</label><span id="val-fps">12</span></div>
                    <input type="range" id="sl-fps" min="2" max="60" step="1" value="12">
                </div>
                <div>
                    <div class="flex justify-between text-[11px] font-bold mb-1"><label>INTENSIDAD / ABERRACIÓN</label><span id="val-int">0.5</span></div>
                    <input type="range" id="sl-int" min="0" max="1" step="0.01" value="0.5">
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('modo');
        const hostId = urlParams.get('id');

        const peerConfig = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } };
        let peer = null;
        let dataConnection = null;
        
        let vfxState = { mode: 0, fps: 12, intensity: 0.5 };

        // --- UBERSHADER: 10 Efectos Matemáticos en un solo pase ---
        const vertexShader = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
        `;

        const fragmentShader = `
            uniform sampler2D tDiffuse;
            uniform int u_mode;
            uniform float u_intensity;
            uniform float u_time;
            varying vec2 vUv;

            // Función Helper RGB a Luma
            float getLuma(vec3 color) { return dot(color, vec3(0.299, 0.587, 0.114)); }

            void main() {
                vec2 uv = vUv;
                vec4 texColor = texture2D(tDiffuse, uv);
                vec3 finalColor = texColor.rgb;

                // 0. SPIDER-VERSE (Halftone + Glitch Offset)
                if (u_mode == 0) {
                    float offset = u_intensity * 0.05;
                    float r = texture2D(tDiffuse, vec2(uv.x + offset, uv.y)).r;
                    float b = texture2D(tDiffuse, vec2(uv.x - offset, uv.y)).b;
                    vec3 glitch = vec3(r, texColor.g, b);
                    
                    float luma = getLuma(glitch);
                    vec2 px = gl_FragCoord.xy / (4.0 - u_intensity * 2.0);
                    float pattern = sin(px.x) * sin(px.y);
                    float comic = step(pattern, luma * 1.5 - 0.5);
                    finalColor = mix(vec3(0.02, 0.0, 0.1), glitch, comic + 0.2);
                }
                
                // 1. DATA MOSH (Fake Pixel Sorting / Smear)
                else if (u_mode == 1) {
                    float luma = getLuma(texColor.rgb);
                    if (luma > 0.4 && luma < 0.8) {
                        uv.y += u_intensity * 0.2 * sin(uv.x * 50.0 + u_time);
                        finalColor = texture2D(tDiffuse, fract(uv)).rgb;
                    }
                }
                
                // 2. FLUID LIQUIFY
                else if (u_mode == 2) {
                    uv.x += sin(uv.y * 10.0 + u_time * 2.0) * 0.05 * u_intensity;
                    uv.y += cos(uv.x * 10.0 + u_time * 2.0) * 0.05 * u_intensity;
                    finalColor = texture2D(tDiffuse, fract(uv)).rgb;
                }
                
                // 3. SOBEL NEON (Edge Detection)
                else if (u_mode == 3) {
                    vec2 texel = vec2(1.0 / 1280.0, 1.0 / 720.0) * (u_intensity * 5.0 + 1.0);
                    float s00 = getLuma(texture2D(tDiffuse, uv + texel * vec2(-1, -1)).rgb);
                    float s22 = getLuma(texture2D(tDiffuse, uv + texel * vec2(1, 1)).rgb);
                    float s02 = getLuma(texture2D(tDiffuse, uv + texel * vec2(-1, 1)).rgb);
                    float s20 = getLuma(texture2D(tDiffuse, uv + texel * vec2(1, -1)).rgb);
                    float edge = abs(s00 - s22) + abs(s02 - s20);
                    finalColor = mix(vec3(0.0), vec3(0.0, 1.0, 0.8), edge * 5.0); // Cyan Neon
                }
                
                // 4. KINETIC PULSE (Audio-Reactive placeholder based on time/intensity)
                else if (u_mode == 4) {
                    vec2 center = vec2(0.5);
                    float dist = distance(uv, center);
                    float pulse = sin(dist * 20.0 - u_time * 5.0) * u_intensity * 0.1;
                    finalColor = texture2D(tDiffuse, uv + (uv - center) * pulse).rgb;
                }
                
                // 5. CRT GHOSTING
                else if (u_mode == 5) {
                    float scanline = sin(uv.y * 800.0) * 0.04;
                    float r = texture2D(tDiffuse, uv + vec2(u_intensity * 0.01, 0.0)).r;
                    float b = texture2D(tDiffuse, uv - vec2(u_intensity * 0.01, 0.0)).b;
                    finalColor = vec3(r, texColor.g, b) - scanline;
                    // Vignette
                    float dist = distance(uv, vec2(0.5));
                    finalColor *= smoothstep(0.8, 0.2, dist);
                }

                // 6. CHROMATIC EXTREMA
                else if (u_mode == 6) {
                    float amt = u_intensity * 0.2;
                    float r = texture2D(tDiffuse, vec2(uv.x + amt, uv.y - amt)).r;
                    float g = texture2D(tDiffuse, uv).g;
                    float b = texture2D(tDiffuse, vec2(uv.x - amt, uv.y + amt)).b;
                    finalColor = vec3(r, g, b);
                }

                // 7. FAKE DEPTH MAP
                else if (u_mode == 7) {
                    float luma = getLuma(texColor.rgb);
                    vec2 center = vec2(0.5);
                    vec2 depthUv = center + (uv - center) * (1.0 - luma * u_intensity * 0.5);
                    finalColor = texture2D(tDiffuse, depthUv).rgb;
                }

                // 8. ASCII VOID
                else if (u_mode == 8) {
                    float pixels = 100.0 - (u_intensity * 50.0);
                    vec2 pixelatedUv = floor(uv * pixels) / pixels;
                    vec3 pColor = texture2D(tDiffuse, pixelatedUv).rgb;
                    float luma = getLuma(pColor);
                    if(luma < 0.2) finalColor = vec3(0.0);
                    else if(luma < 0.5) finalColor = vec3(0.1, 0.3, 0.1);
                    else if(luma < 0.8) finalColor = vec3(0.3, 0.8, 0.3);
                    else finalColor = vec3(0.8, 1.0, 0.8); // Estilo Matrix
                }

                // 9. THERMAL PREDATOR
                else if (u_mode == 9) {
                    float luma = getLuma(texColor.rgb);
                    luma = fract(luma + u_intensity * u_time * 0.5); // Animado
                    vec3 heat;
                    if (luma < 0.33) heat = mix(vec3(0.0, 0.0, 0.5), vec3(1.0, 0.0, 0.0), luma * 3.0);
                    else if (luma < 0.66) heat = mix(vec3(1.0, 0.0, 0.0), vec3(1.0, 1.0, 0.0), (luma - 0.33) * 3.0);
                    else heat = mix(vec3(1.0, 1.0, 0.0), vec3(1.0), (luma - 0.66) * 3.0);
                    finalColor = heat;
                }

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // ==========================================
        // HOST LAYER (PANTALLA)
        // ==========================================
        if (mode !== 'controlador') {
            document.getElementById('ui-layer').style.display = 'flex';

            const scene = new THREE.Scene();
            // Truco: Para encajar un stream 16:9 de celular en una pantalla 16:9, usamos cámara ortográfica
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const mediaFeed = document.getElementById('media-feed');
            mediaFeed.play(); // Asegurar que el fallback de Wix ruede
            
            const texCanvas = document.getElementById('texture-canvas');
            const texCtx = texCanvas.getContext('2d', { willReadFrequently: true });
            texCanvas.width = 1280; texCanvas.height = 720;
            
            const videoTexture = new THREE.CanvasTexture(texCanvas);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;

            const shaderMat = new THREE.ShaderMaterial({
                uniforms: {
                    tDiffuse: { value: videoTexture },
                    u_mode: { value: vfxState.mode },
                    u_intensity: { value: vfxState.intensity },
                    u_time: { value: 0.0 }
                },
                vertexShader: vertexShader,
                fragmentShader: fragmentShader
            });

            const plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMat);
            scene.add(plane);

            let lastDrawTime = 0;
            const clock = new THREE.Clock();
            
            function animate() {
                requestAnimationFrame(animate);
                
                // Stop-Motion Engine: Controla la lectura del video al canvas
                if (mediaFeed.readyState >= mediaFeed.HAVE_CURRENT_DATA) {
                    const now = Date.now();
                    const frameInterval = 1000 / vfxState.fps; 
                    if (now - lastDrawTime >= frameInterval) {
                        // Al dibujarlo en canvas 12 veces por segundo (default), se ve animado a mano
                        texCtx.drawImage(mediaFeed, 0, 0, texCanvas.width, texCanvas.height);
                        videoTexture.needsUpdate = true;
                        lastDrawTime = now;
                    }
                }
                
                // Update Shaders
                shaderMat.uniforms.u_mode.value = vfxState.mode;
                shaderMat.uniforms.u_intensity.value = vfxState.intensity;
                shaderMat.uniforms.u_time.value = clock.getElapsedTime();

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));

            // WEBRTC
            peer = new Peer(peerConfig); 
            
            peer.on('open', (id) => {
                const url = window.location.href.split('?')[0] + `?modo=controlador&id=${id}`;
                new QRCode(document.getElementById("qrcode"), {
                    text: url, width: 120, height: 120, colorDark : "#32527B", colorLight : "#ffffff"
                });
            });

            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'vfx') vfxState = data.state;
                });
            });

            // CUANDO ENTRA LA CÁMARA DEL CELULAR:
            peer.on('call', (call) => {
                call.answer(); 
                document.getElementById('host-status').innerText = "VFX ENGINE: STREAM EN VIVO INTERCEPTADO";
                document.getElementById('host-status').classList.add('text-sgxYellow');
                
                call.on('stream', (remoteStream) => {
                    // Magia aquí: Reemplazamos el video de loop por la cámara sin tocar WebGL
                    mediaFeed.srcObject = remoteStream;
                    mediaFeed.play();
                });
            });
        } 
        
        // ==========================================
        // CELULAR LAYER (REMOTO)
        // ==========================================
        else if (mode === 'controlador' && hostId) {
            document.getElementById('controller-ui').style.display = 'flex';
            let localStream = null;

            document.getElementById('btn-activar').addEventListener('click', async (e) => {
                e.target.innerText = "INICIALIZANDO...";
                try {
                    // Config para portrait ratio
                    localStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    document.getElementById('local-video').srcObject = localStream;
                    document.getElementById('setup-section').style.display = 'none';
                    document.getElementById('live-indicator').style.display = 'block';
                    initRemote();
                } catch (err) { alert("Acepta los permisos de cámara en HTTPS."); }
            });

            function initRemote() {
                peer = new Peer(peerConfig);
                peer.on('open', () => {
                    dataConnection = peer.connect(hostId, { reliable: true });
                    peer.call(hostId, localStream);
                });
            }

            // Lógica UI Controles
            const uiFPS = document.getElementById('sl-fps');
            const uiInt = document.getElementById('sl-int');
            const btns = document.querySelectorAll('.effect-btn');

            const sendData = () => {
                vfxState.fps = parseInt(uiFPS.value);
                vfxState.intensity = parseFloat(uiInt.value);
                document.getElementById('val-fps').innerText = vfxState.fps;
                document.getElementById('val-int').innerText = vfxState.intensity.toFixed(2);
                
                if(dataConnection && dataConnection.open) {
                    dataConnection.send({ type: 'vfx', state: vfxState });
                }
            };

            uiFPS.addEventListener('input', sendData);
            uiInt.addEventListener('input', sendData);

            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    btns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    vfxState.mode = parseInt(e.target.dataset.mode);
                    sendData();
                    // Feedback Haptico para tu cerebro
                    if(navigator.vibrate) navigator.vibrate(20); 
                });
            });
        }
    </script>
</body>
</html>
