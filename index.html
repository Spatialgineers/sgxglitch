<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX Ultimate Glitch Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background-color: #010409; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; margin: 0; touch-action: manipulation; }
        
        /* SGX Tactical UI Styling */
        .sgx-panel { background: rgba(2, 8, 15, 0.98); border-right: 1px solid #1f2937; border-left: 4px solid #FDCC0D; }
        .control-group { background: #0a0e14; padding: 12px; border-radius: 8px; border: 1px solid #1f2937; margin-bottom: 8px; }
        
        /* Tactical Sliders */
        input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: #1f2937; border-radius: 3px; outline: none; margin-top: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #FDCC0D; cursor: pointer; border: 2px solid #010409; box-shadow: 0 0 8px rgba(253,204,13,0.5); }
        input[type=color] { border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; padding: 0; background: transparent; }
        
        /* Buttons */
        .action-btn { background: #0f172a; border: 1px solid #334155; font-size: 10px; font-weight: 800; text-align: center; border-radius: 6px; cursor: pointer; transition: all 0.2s; color: #94a3b8; display: flex; align-items: center; justify-content: center; padding: 8px 12px; text-transform: uppercase; letter-spacing: 0.05em; }
        .action-btn:hover { background: #1e293b; color: #fff; border-color: #FDCC0D; }
        .action-btn.active { background: #FDCC0D; color: #000; border-color: #FDCC0D; box-shadow: 0 0 15px rgba(253,204,13,0.4); }

        /* Stealth Scrollbar */
        .scrollable-area::-webkit-scrollbar { width: 4px; height: 4px; }
        .scrollable-area::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 4px; }
        
        /* Canvas */
        #webgl-container { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        canvas { display: block; max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 50px rgba(253,204,13,0.05); border: 1px solid #1e293b; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-full">

    <!-- CONTROL CENTER -->
    <aside class="w-full md:w-[380px] h-[55vh] md:h-screen sgx-panel flex flex-col order-2 md:order-1 relative z-10 shadow-2xl">
        
        <!-- Header & Inputs -->
        <div class="px-5 py-4 border-b border-gray-800 shrink-0 bg-[#02080f]">
            <h1 class="text-base font-black tracking-tight text-[#FDCC0D] italic uppercase mb-3">SGX Glitch Master</h1>
            <div class="flex gap-2">
                <button id="btn-cam" class="action-btn flex-1 !text-[9px]">📷 Live Cam</button>
                <label class="action-btn flex-1 !text-[9px] !m-0">
                    📁 Upload
                    <input type="file" id="video-upload" accept="video/*,image/*" class="hidden">
                </label>
                <button id="btn-random" class="action-btn flex-1 !text-[9px] !bg-red-900/40 hover:!bg-red-600 !border-red-900 !text-white">☢️ Mutate</button>
            </div>
        </div>

        <!-- Scrollable Dashboard -->
        <div class="p-4 flex-1 overflow-y-auto scrollable-area flex flex-col gap-3">
            
            <!-- 1. SPATIAL DISPLACEMENT -->
            <div class="control-group border-[#FDCC0D]/30">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-gray-800 pb-1.5 mb-2.5">Displacement Engine</h2>
                <div class="grid grid-cols-2 gap-x-4 gap-y-3">
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Block Glitch</span> <span id="val-block">0%</span></label>
                        <input type="range" id="fx-block" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Line Tear</span> <span id="val-tear">0%</span></label>
                        <input type="range" id="fx-tear" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Wave Warp</span> <span id="val-wave">0%</span></label>
                        <input type="range" id="fx-wave" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Pixelate</span> <span id="val-pixel">0%</span></label>
                        <input type="range" id="fx-pixel" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            <!-- 2. CHROMATIC ABERRATION -->
            <div class="control-group border-blue-900/30">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-gray-800 pb-1.5 mb-2.5">Chromatic Split</h2>
                <div class="grid grid-cols-2 gap-x-4 gap-y-3">
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>RGB Offset X</span> <span id="val-rgbX">0%</span></label>
                        <input type="range" id="fx-rgbX" min="-100" max="100" value="0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>RGB Offset Y</span> <span id="val-rgbY">0%</span></label>
                        <input type="range" id="fx-rgbY" min="-100" max="100" value="0">
                    </div>
                    <div class="col-span-2">
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Chroma Bleed (VHS)</span> <span id="val-bleed">0%</span></label>
                        <input type="range" id="fx-bleed" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            <!-- 3. DEGRADATION & ARTIFACTS -->
            <div class="control-group border-red-900/30">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-gray-800 pb-1.5 mb-2.5">Artifacts & Noise</h2>
                <div class="grid grid-cols-2 gap-x-4 gap-y-3">
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>CRT Scanlines</span> <span id="val-crt">0%</span></label>
                        <input type="range" id="fx-crt" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Static Noise</span> <span id="val-noise">0%</span></label>
                        <input type="range" id="fx-noise" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>VHS Jitter</span> <span id="val-jitter">0%</span></label>
                        <input type="range" id="fx-jitter" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Glitch Speed</span> <span id="val-speed">1x</span></label>
                        <input type="range" id="fx-speed" min="0" max="300" value="100">
                    </div>
                </div>
            </div>

            <!-- 4. COLOR GRADING -->
            <div class="control-group">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-gray-800 pb-1.5 mb-2.5">Core Grading</h2>
                <div class="grid grid-cols-2 gap-x-4 gap-y-3">
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Brt</span> <span id="val-bright">100%</span></label>
                        <input type="range" id="fx-bright" min="0" max="200" value="100">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Con</span> <span id="val-cont">100%</span></label>
                        <input type="range" id="fx-cont" min="0" max="200" value="100">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Sat</span> <span id="val-sat">100%</span></label>
                        <input type="range" id="fx-sat" min="0" max="300" value="100">
                    </div>
                    <div>
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Hue</span> <span id="val-hue">0°</span></label>
                        <input type="range" id="fx-hue" min="-180" max="180" value="0">
                    </div>
                    <div class="col-span-2">
                        <label class="flex justify-between text-[9px] font-mono text-gray-400"><span>Invert</span> <span id="val-invert">0%</span></label>
                        <input type="range" id="fx-invert" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

        </div>

        <!-- Render Footer -->
        <div class="p-4 bg-[#02080f] border-t border-gray-800 shrink-0">
            <button id="render-btn" class="w-full bg-[#FDCC0D] text-black text-[11px] font-black py-3.5 rounded hover:bg-yellow-400 transition-colors disabled:opacity-50 disabled:bg-gray-800 disabled:text-gray-500 uppercase tracking-widest shadow-[0_0_20px_rgba(253,204,13,0.15)]" disabled>
                Start Recording
            </button>
            <p id="render-status" class="text-[8px] text-center text-gray-500 mt-2 font-mono uppercase tracking-widest">Awaiting Source Feed...</p>
        </div>
    </aside>

    <!-- WEBGL RENDER AREA -->
    <main id="webgl-container" class="w-full md:flex-1 h-[45vh] md:h-screen flex items-center justify-center p-2 md:p-8 relative order-1 md:order-2 z-0">
        <video id="hidden-video" class="hidden" loop muted playsinline></video>
        <canvas id="texture-canvas" class="hidden"></canvas>
    </main>

    <script>
        // --- 1. CORE DOM ELEMENTS ---
        const videoInput = document.getElementById('video-upload');
        const btnCam = document.getElementById('btn-cam');
        const btnRandom = document.getElementById('btn-random');
        const video = document.getElementById('hidden-video');
        const texCanvas = document.getElementById('texture-canvas');
        const texCtx = texCanvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('webgl-container');
        const renderBtn = document.getElementById('render-btn');
        const renderStatus = document.getElementById('render-status');

        let liveStream = null;

        // --- 2. UNIFORM STATE & MAPPING ---
        let vfxState = {
            block: 0, tear: 0, wave: 0, pixel: 0,
            rgbX: 0, rgbY: 0, bleed: 0,
            crt: 0, noise: 0, jitter: 0, speed: 1.0,
            bright: 1.0, cont: 1.0, sat: 1.0, hue: 0.0, invert: 0.0
        };

        const uiMap = {
            'fx-block': { key: 'block', unit: '%', mult: 0.01 },
            'fx-tear': { key: 'tear', unit: '%', mult: 0.01 },
            'fx-wave': { key: 'wave', unit: '%', mult: 0.01 },
            'fx-pixel': { key: 'pixel', unit: '%', mult: 0.01 },
            'fx-rgbX': { key: 'rgbX', unit: '%', mult: 0.01 },
            'fx-rgbY': { key: 'rgbY', unit: '%', mult: 0.01 },
            'fx-bleed': { key: 'bleed', unit: '%', mult: 0.01 },
            'fx-crt': { key: 'crt', unit: '%', mult: 0.01 },
            'fx-noise': { key: 'noise', unit: '%', mult: 0.01 },
            'fx-jitter': { key: 'jitter', unit: '%', mult: 0.01 },
            'fx-speed': { key: 'speed', unit: 'x', mult: 0.01 },
            'fx-bright': { key: 'bright', unit: '%', mult: 0.01 },
            'fx-cont': { key: 'cont', unit: '%', mult: 0.01 },
            'fx-sat': { key: 'sat', unit: '%', mult: 0.01 },
            'fx-hue': { key: 'hue', unit: '°', mult: 1 },
            'fx-invert': { key: 'invert', unit: '%', mult: 0.01 }
        };

        // --- 3. THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
        container.appendChild(renderer.domElement);

        const videoTexture = new THREE.CanvasTexture(texCanvas);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        const vertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`;

        // EL MOTOR GLITCH (SHADER MAESTRO)
        const fragmentShader = `
            uniform sampler2D tDiffuse;
            uniform float u_time;
            
            uniform float u_block;
            uniform float u_tear;
            uniform float u_wave;
            uniform float u_pixel;
            
            uniform vec2 u_rgb;
            uniform float u_bleed;
            
            uniform float u_crt;
            uniform float u_noise;
            uniform float u_jitter;
            
            uniform float u_bright;
            uniform float u_cont;
            uniform float u_sat;
            uniform float u_hue;
            uniform float u_invert;

            varying vec2 vUv;

            // PRNG (Pseudo-Random Number Generator)
            float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
            float getLuma(vec3 color) { return dot(color, vec3(0.299, 0.587, 0.114)); }
            
            vec3 hueShift(vec3 color, float hue) {
                const vec3 k = vec3(0.57735, 0.57735, 0.57735);
                float cosAngle = cos(hue);
                return vec3(color * cosAngle + cross(k, color) * sin(hue) + k * dot(k, color) * (1.0 - cosAngle));
            }

            void main() {
                vec2 uv = vUv;
                
                // 0. JITTER (Vertical VHS Shake)
                if (u_jitter > 0.0) {
                    float jitterY = random(vec2(u_time, 0.0)) * u_jitter * 0.05;
                    uv.y += (random(vec2(u_time * 10.0, 0.0)) > 0.8) ? jitterY : 0.0;
                }

                // 1. WAVE WARP
                if (u_wave > 0.0) {
                    uv.x += sin(uv.y * 20.0 + u_time * 5.0) * u_wave * 0.05;
                    uv.y += cos(uv.x * 15.0 - u_time * 3.0) * u_wave * 0.02;
                }

                // 2. PIXELATE
                if (u_pixel > 0.0) {
                    float pixels = mix(2000.0, 20.0, u_pixel);
                    uv = floor(uv * pixels) / pixels;
                }

                // 3. HORIZONTAL TEAR
                if (u_tear > 0.0) {
                    float tearRow = floor(uv.y * 50.0);
                    float tearFactor = random(vec2(tearRow, u_time));
                    if (tearFactor > 1.0 - u_tear) {
                        uv.x += (random(vec2(u_time, tearRow)) - 0.5) * u_tear * 0.2;
                    }
                }

                // 4. BLOCK GLITCH (Data Corruption)
                if (u_block > 0.0) {
                    vec2 blockUv = floor(uv * vec2(16.0, 16.0));
                    float blockNoise = random(blockUv + floor(u_time * 10.0));
                    if (blockNoise > 1.0 - (u_block * 0.5)) {
                        uv.x += (random(blockUv) - 0.5) * u_block * 0.2;
                        uv.y += (random(blockUv + 1.0) - 0.5) * u_block * 0.2;
                    }
                }

                // Wrap UVs to prevent edge tearing into black
                uv = fract(uv);

                // 5. CHROMATIC ABERRATION & BLEED
                vec2 rgbOffset = u_rgb * 0.1;
                
                // Bleed simulates bad VHS tracking (horizontal blur on red/blue)
                vec4 color = vec4(0.0);
                if (u_bleed > 0.0) {
                    float bAmt = u_bleed * 0.02;
                    color.r = texture2D(tDiffuse, uv + rgbOffset + vec2(bAmt, 0.0)).r;
                    color.g = texture2D(tDiffuse, uv).g;
                    color.b = texture2D(tDiffuse, uv - rgbOffset - vec2(bAmt, 0.0)).b;
                    
                    // Extra sample for bleed smearing
                    color.r += texture2D(tDiffuse, uv + rgbOffset + vec2(bAmt*2.0, 0.0)).r * 0.5;
                    color.b += texture2D(tDiffuse, uv - rgbOffset - vec2(bAmt*2.0, 0.0)).b * 0.5;
                } else {
                    color.r = texture2D(tDiffuse, uv + rgbOffset).r;
                    color.g = texture2D(tDiffuse, uv).g;
                    color.b = texture2D(tDiffuse, uv - rgbOffset).b;
                }

                vec3 finalColor = color.rgb;

                // 6. COLOR GRADING
                finalColor = (finalColor - 0.5) * u_cont + 0.5 + (u_bright - 1.0);
                float luma = getLuma(finalColor);
                finalColor = mix(vec3(luma), finalColor, u_sat);
                if(abs(u_hue) > 0.0) finalColor = hueShift(finalColor, u_hue);
                finalColor = mix(finalColor, 1.0 - finalColor, u_invert);

                // 7. ARTIFACTS (Noise & CRT)
                if (u_noise > 0.0) {
                    float n = random(uv + u_time * 100.0);
                    finalColor += (n - 0.5) * u_noise * 0.5;
                }
                if (u_crt > 0.0) {
                    float scanline = sin(uv.y * 800.0) * 0.04 * u_crt;
                    finalColor -= scanline;
                    
                    // CRT Vignette
                    float vig = smoothstep(1.5, 0.5 - u_crt * 0.3, length(vUv - 0.5));
                    finalColor *= vig;
                }

                gl_FragColor = vec4(clamp(finalColor, 0.0, 1.0), 1.0);
            }
        `;

        const shaderMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: videoTexture },
                u_time: { value: 0.0 },
                u_block: { value: 0.0 },
                u_tear: { value: 0.0 },
                u_wave: { value: 0.0 },
                u_pixel: { value: 0.0 },
                u_rgb: { value: new THREE.Vector2(0,0) },
                u_bleed: { value: 0.0 },
                u_crt: { value: 0.0 },
                u_noise: { value: 0.0 },
                u_jitter: { value: 0.0 },
                u_bright: { value: 1.0 },
                u_cont: { value: 1.0 },
                u_sat: { value: 1.0 },
                u_hue: { value: 0.0 },
                u_invert: { value: 0.0 }
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader
        });

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMat));
        const clock = new THREE.Clock();

        // --- 4. UI LOGIC ---
        const syncUI = () => {
            Object.keys(uiMap).forEach(id => {
                const el = document.getElementById(id);
                const map = uiMap[id];
                if(el && map) {
                    vfxState[map.key] = parseFloat(el.value) * map.mult;
                    const label = document.getElementById(`val-${map.key}`);
                    if(label) label.innerText = el.value + map.unit;
                }
            });

            // Update Shader Uniforms
            shaderMat.uniforms.u_block.value = vfxState.block;
            shaderMat.uniforms.u_tear.value = vfxState.tear;
            shaderMat.uniforms.u_wave.value = vfxState.wave;
            shaderMat.uniforms.u_pixel.value = vfxState.pixel;
            shaderMat.uniforms.u_rgb.value.set(vfxState.rgbX, vfxState.rgbY);
            shaderMat.uniforms.u_bleed.value = vfxState.bleed;
            shaderMat.uniforms.u_crt.value = vfxState.crt;
            shaderMat.uniforms.u_noise.value = vfxState.noise;
            shaderMat.uniforms.u_jitter.value = vfxState.jitter;
            
            shaderMat.uniforms.u_bright.value = vfxState.bright;
            shaderMat.uniforms.u_cont.value = vfxState.cont;
            shaderMat.uniforms.u_sat.value = vfxState.sat;
            shaderMat.uniforms.u_hue.value = vfxState.hue * (Math.PI / 180);
            shaderMat.uniforms.u_invert.value = vfxState.invert;
        };

        Object.keys(uiMap).forEach(id => document.getElementById(id).addEventListener('input', syncUI));

        // HYPERDRIVE / MUTATE BUTTON
        btnRandom.addEventListener('click', () => {
            const r = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);
            document.getElementById('fx-block').value = r(0, 80);
            document.getElementById('fx-tear').value = r(0, 80);
            document.getElementById('fx-wave').value = r(0, 60);
            document.getElementById('fx-rgbX').value = r(-50, 50);
            document.getElementById('fx-rgbY').value = r(-50, 50);
            document.getElementById('fx-bleed').value = r(0, 100);
            document.getElementById('fx-crt').value = r(0, 100);
            document.getElementById('fx-noise').value = r(0, 60);
            document.getElementById('fx-jitter').value = r(0, 50);
            syncUI();
        });

        // --- 5. SOURCE HANDLING (FILE & CAMERA) ---
        let isPlaying = false;

        function startPlayback() {
            video.play();
            isPlaying = true;
            renderBtn.disabled = false;
            renderStatus.textContent = "SYSTEM READY";
            btnCam.classList.remove('active');

            video.onloadedmetadata = () => {
                const w = video.videoWidth;
                const h = video.videoHeight;
                texCanvas.width = w;
                texCanvas.height = h;
                renderer.setSize(w, h);
                drawFrame();
            };
        }

        // Upload
        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (liveStream) { liveStream.getTracks().forEach(t => t.stop()); }
            video.srcObject = null;
            video.src = URL.createObjectURL(file);
            startPlayback();
        });

        // Live Cam
        btnCam.addEventListener('click', async () => {
            try {
                if (liveStream) { liveStream.getTracks().forEach(t => t.stop()); }
                liveStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.src = "";
                video.srcObject = liveStream;
                btnCam.classList.add('active');
                startPlayback();
            } catch (err) {
                renderStatus.textContent = "CAM ACCESS DENIED";
                console.error("Camera Error:", err);
            }
        });

        // --- 6. RENDER LOOP ---
        function drawFrame() {
            if (!isPlaying) return;
            requestAnimationFrame(drawFrame);

            // Throttle FPS to match selected speed (base 60fps * speed)
            const speed = vfxState.speed;
            
            if (video.readyState >= 2) {
                texCtx.drawImage(video, 0, 0, texCanvas.width, texCanvas.height);
                videoTexture.needsUpdate = true;
            }
            
            shaderMat.uniforms.u_time.value += clock.getDelta() * speed;
            renderer.render(scene, camera);
        }

        // --- 7. RECORDER ---
        let mediaRecorder;
        let recordedChunks = [];

        renderBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                renderBtn.textContent = 'Start Recording';
                renderBtn.classList.replace('bg-red-600', 'bg-[#FDCC0D]');
                renderBtn.classList.replace('text-white', 'text-black');
                renderStatus.textContent = "PROCESSING OUTPUT...";
                return;
            }

            recordedChunks = [];
            const stream = renderer.domElement.captureStream(30);
            let mimeType = 'video/mp4';
            let fileExtension = 'mp4';

            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm; codecs=vp9';
                fileExtension = 'webm';
                if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
            }

            mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `SGX_GLITCH_${Date.now()}.${fileExtension}`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
                renderStatus.textContent = `SAVED AS .${fileExtension.toUpperCase()}`;
            };

            mediaRecorder.start();
            renderBtn.textContent = '■ STOP & SAVE';
            renderBtn.classList.replace('bg-[#FDCC0D]', 'bg-red-600');
            renderBtn.classList.replace('text-black', 'text-white');
            renderStatus.textContent = "RECORDING GLSL MASTER...";
        });
    </script>
</body>
</html>
